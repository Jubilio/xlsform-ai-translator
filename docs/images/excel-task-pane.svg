    <text x="38" y="450" fill="#ffffff" font-family="Segoe UI,Arial,sans-serif" font-size="11">✓</text>
    <text x="57" y="450" fill="#334155" font-family="Segoe UI,Arial,sans-serif" font-size="13">survey</text>
    <rect x="126" y="438" width="14" height="14" rx="3" fill="#177267"/>
    <text x="130" y="450" fill="#ffffff" font-family="Segoe UI,Arial,sans-serif" font-size="11">✓</text>
    <text x="149" y="450" fill="#334155" font-family="Segoe UI,Arial,sans-serif" font-size="13">choices</text>
    <rect x="214" y="438" width="14" height="14" rx="3" fill="#ffffff" stroke="#94a3b8"/>
    <text x="237" y="450" fill="#334155" font-family="Segoe UI,Arial,sans-serif" font-size="13">settings</text>
    <rect x="34" y="475" width="14" height="14" rx="3" fill="#177267"/>
    <text x="38" y="487" fill="#ffffff" font-family="Segoe UI,Arial,sans-serif" font-size="11">✓</text>
    <text x="57" y="487" fill="#334155" font-family="Segoe UI,Arial,sans-serif" font-size="13">Use humanitarian glossary</text>

