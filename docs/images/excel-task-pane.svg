<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="760" viewBox="0 0 1400 760" role="img" aria-labelledby="title desc">
  <title id="title">XLSForm AI Translator running inside Microsoft Excel</title>
  <desc id="desc">Illustration of an Excel workbook with translated cells and the XLSForm AI Translator task pane.</desc>
  <defs>
