<svg xmlns="http://www.w3.org/2000/svg" width="640" height="820" viewBox="0 0 640 820" role="img" aria-labelledby="title desc">
  <title id="title">XLSForm AI Translator web development panel</title>
  <desc id="desc">Illustration of the standalone development panel with language, provider, XLSForm options and translation buttons.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f6f9fb"/>
      <stop offset="1" stop-color="#eef3f5"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="5" stdDeviation="9" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
  </defs>
  <rect width="640" height="820" rx="24" fill="url(#bg)"/>
  <rect x="58" y="24" width="50" height="50" rx="12" fill="#177267" filter="url(#shadow)"/>
  <text x="83" y="56" text-anchor="middle" fill="#ffffff" font-family="Segoe UI,Arial,sans-serif" font-size="15" font-weight="700">XT</text>
  <text x="124" y="46" fill="#0f172a" font-family="Segoe UI,Arial,sans-serif" font-size="21" font-weight="700">XLSForm AI Translator</text>
  <text x="124" y="68" fill="#64748b" font-family="Segoe UI,Arial,sans-serif" font-size="14">Translate labels and hints without changing the form logic.</text>
  <rect x="550" y="28" width="42" height="42" rx="10" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="571" y="55" text-anchor="middle" fill="#475569" font-family="Segoe UI Symbol,Segoe UI,Arial,sans-serif" font-size="19">⚙</text>

  <rect x="58" y="90" width="534" height="46" rx="10" fill="#fff8e7" stroke="#e9b755"/>
  <text x="73" y="119" fill="#8a5a00" font-family="Segoe UI,Arial,sans-serif" font-size="14">Open this panel inside Microsoft Excel.</text>

  <rect x="58" y="153" width="534" height="265" rx="14" fill="#ffffff" stroke="#d5dee5" filter="url(#shadow)"/>
  <text x="76" y="185" fill="#0f172a" font-family="Segoe UI,Arial,sans-serif" font-size="16" font-weight="700">Languages</text>
  <text x="76" y="214" fill="#334155" font-family="Segoe UI,Arial,sans-serif" font-size="12">Source</text>
  <text x="330" y="214" fill="#334155" font-family="Segoe UI,Arial,sans-serif" font-size="12">Target</text>
  <rect x="76" y="225" width="238" height="40" rx="8" fill="#ffffff" stroke="#b9c7d2"/>
  <rect x="330" y="225" width="244" height="40" rx="8" fill="#ffffff" stroke="#b9c7d2"/>
  <text x="91" y="251" fill="#0f172a" font-family="Segoe UI,Arial,sans-serif" font-size="13">English</text>
  <text x="345" y="251" fill="#0f172a" font-family="Segoe UI,Arial,sans-serif" font-size="13">Portuguese</text>
  <text x="293" y="251" fill="#475569" font-family="Segoe UI,Arial,sans-serif" font-size="13">⌄</text>
  <text x="552" y="251" fill="#475569" font-family="Segoe UI,Arial,sans-serif" font-size="13">⌄</text>
  <text x="76" y="294" fill="#334155" font-family="Segoe UI,Arial,sans-serif" font-size="12">Language variant</text>
  <rect x="76" y="305" width="498" height="40" rx="8" fill="#ffffff" stroke="#b9c7d2"/>
  <text x="91" y="331" fill="#0f172a" font-family="Segoe UI,Arial,sans-serif" font-size="13">Mozambican Portuguese</text>
  <text x="552" y="331" fill="#475569" font-family="Segoe UI,Arial,sans-serif" font-size="13">⌄</text>
  <text x="76" y="374" fill="#334155" font-family="Segoe UI,Arial,sans-serif" font-size="12">Provider</text>
  <rect x="76" y="385" width="498" height="40" rx="8" fill="#ffffff" stroke="#b9c7d2"/>
  <text x="91" y="411" fill="#0f172a" font-family="Segoe UI,Arial,sans-serif" font-size="13">Configured on the server</text>
  <text x="552" y="411" fill="#475569" font-family="Segoe UI,Arial,sans-serif" font-size="13">⌄</text>

  <rect x="58" y="438" width="534" height="206" rx="14" fill="#ffffff" stroke="#d5dee5" filter="url(#shadow)"/>
  <text x="76" y="471" fill="#0f172a" font-family="Segoe UI,Arial,sans-serif" font-size="16" font-weight="700">XLSForm options</text>
  <g font-family="Segoe UI,Arial,sans-serif" font-size="13" fill="#334155">
    <rect x="79" y="493" width="14" height="14" rx="3" fill="#177267"/>
    <text x="82" y="505" fill="#ffffff" font-size="11">✓</text>
    <text x="102" y="505">survey</text>
    <rect x="158" y="493" width="14" height="14" rx="3" fill="#177267"/>
    <text x="161" y="505" fill="#ffffff" font-size="11">✓</text>
    <text x="181" y="505">choices</text>
    <rect x="247" y="493" width="14" height="14" rx="3" fill="#ffffff" stroke="#94a3b8"/>
    <text x="270" y="505">settings</text>

    <rect x="79" y="535" width="14" height="14" rx="3" fill="#177267"/>
    <text x="82" y="547" fill="#ffffff" font-size="11">✓</text>
    <text x="102" y="547">Use humanitarian glossary</text>

    <rect x="79" y="573" width="14" height="14" rx="3" fill="#ffffff" stroke="#94a3b8"/>
    <text x="102" y="585">Replace existing translations</text>

    <rect x="79" y="611" width="14" height="14" rx="3" fill="#177267"/>
    <text x="82" y="623" fill="#ffffff" font-size="11">✓</text>
    <text x="102" y="623">Review before applying</text>
  </g>

  <rect x="58" y="664" width="534" height="104" rx="14" fill="#ffffff" stroke="#d5dee5" filter="url(#shadow)"/>
  <rect x="76" y="681" width="240" height="42" rx="9" fill="#dcefeb"/>
  <text x="196" y="708" text-anchor="middle" fill="#0f5f56" font-family="Segoe UI,Arial,sans-serif" font-size="14" font-weight="700">Translate selection</text>
  <rect x="326" y="681" width="248" height="42" rx="9" fill="#177267"/>
  <text x="450" y="708" text-anchor="middle" fill="#ffffff" font-family="Segoe UI,Arial,sans-serif" font-size="14" font-weight="700">Translate XLSForm</text>
  <rect x="76" y="731" width="498" height="28" rx="8" fill="#e5eaee"/>
  <text x="325" y="750" text-anchor="middle" fill="#334155" font-family="Segoe UI,Arial,sans-serif" font-size="13" font-weight="700">Analyse structure</text>
  <text x="320" y="798" text-anchor="middle" fill="#64748b" font-family="Segoe UI,Arial,sans-serif" font-size="12">Developed by Jubílio Maússe</text>
</svg>
